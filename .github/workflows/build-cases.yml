name: Build cases manifest

on:
  push:
    branches: [main]
    paths:
      - "assets/**"
      - "scripts/build-cases.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate data/cases.json
        run: node scripts/build-cases.mjs

      - name: Commit manifest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cases.json
          if git diff --staged --quiet; then
            echo "cases.json unchanged"
          else
            git commit -m "chore: regenerate cases.json from assets"
            git push
          fi
